server {
    listen       3000;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Proxy settings ──────────────────────────────────────────────────────────
    proxy_ssl_server_name     on;
    proxy_ssl_verify          off;
    proxy_read_timeout        120s;
    proxy_connect_timeout     30s;
    proxy_send_timeout        120s;
    proxy_request_buffering   off;

    # ── Backend API routes (proxied to api.nahlaai.com) ─────────────────────────
    # These handle requests that arrive at this nginx server directly
    # (e.g. internal health probes, webhook callbacks from WhatsApp/Salla).
    # Normal browser-side SPA fetch() calls go directly to api.nahlaai.com
    # via VITE_API_BASE — they do NOT pass through this nginx.

    location /health {
        proxy_pass https://api.nahlaai.com/health;
        proxy_set_header Host             api.nahlaai.com;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /webhook/ {
        proxy_pass https://api.nahlaai.com/webhook/;
        proxy_set_header Host             api.nahlaai.com;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /oauth/ {
        proxy_pass https://api.nahlaai.com/oauth/;
        proxy_set_header Host             api.nahlaai.com;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── React SPA (everything else) ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
