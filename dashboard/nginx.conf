server {
    listen       3000;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Shared proxy settings ───────────────────────────────────────────────
    proxy_ssl_server_name on;
    proxy_ssl_verify      off;

    # Route via custom domain (app.nahlaai.com) instead of railway internal URL
    # to avoid Asia Edge routing issues.
    proxy_read_timeout    120s;
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_request_buffering off;

    # ── Backend API routes ──────────────────────────────────────────────────

    # Root → JSON from backend
    location = / {
        proxy_pass https://app.nahlaai.com/;
        proxy_set_header Host             app.nahlaai.com;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # /api/* → strips the /api prefix and proxies to backend root
    location /api/ {
        proxy_pass https://app.nahlaai.com/;
        proxy_set_header Host             app.nahlaai.com;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Tenant-ID      1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # /oauth/* → Salla OAuth callbacks
    location /oauth/ {
        proxy_pass https://app.nahlaai.com/oauth/;
        proxy_set_header Host             app.nahlaai.com;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # /health* → backend health probes
    location /health {
        proxy_pass https://app.nahlaai.com/health;
        proxy_set_header Host             app.nahlaai.com;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # /webhook/* → WhatsApp + Salla webhooks
    location /webhook/ {
        proxy_pass https://app.nahlaai.com/webhook/;
        proxy_set_header Host             app.nahlaai.com;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── React SPA (everything else) ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
