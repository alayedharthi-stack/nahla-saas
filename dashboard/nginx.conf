server {
    listen       3000;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Shared proxy settings ───────────────────────────────────────────────
    # Used by all backend location blocks below.
    proxy_ssl_server_name on;
    proxy_ssl_verify      off;

    # ── Backend API routes ──────────────────────────────────────────────────
    # All requests to these prefixes go to nahla-saas (FastAPI), never to React.

    # Root → returns JSON from backend (so api.nahlaai.com/ gives {"status":"ok"})
    location = / {
        proxy_pass https://nahla-saas-production.up.railway.app/;
        proxy_set_header Host             nahla-saas-production.up.railway.app;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # /api/* → strips the /api prefix and proxies to backend root
    location /api/ {
        proxy_pass https://nahla-saas-production.up.railway.app/;
        proxy_set_header Host             nahla-saas-production.up.railway.app;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Tenant-ID      1;
        proxy_read_timeout    120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_request_buffering off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # /oauth/* → Salla OAuth callbacks and similar (no JWT required)
    location /oauth/ {
        proxy_pass https://nahla-saas-production.up.railway.app/oauth/;
        proxy_set_header Host             nahla-saas-production.up.railway.app;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # /health* → direct backend health probes
    location /health {
        proxy_pass https://nahla-saas-production.up.railway.app/health;
        proxy_set_header Host             nahla-saas-production.up.railway.app;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # /webhook/* → WhatsApp webhooks from Meta (no JWT, no tenant header)
    location /webhook/ {
        proxy_pass https://nahla-saas-production.up.railway.app/webhook/;
        proxy_set_header Host             nahla-saas-production.up.railway.app;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── React SPA (everything else) ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
